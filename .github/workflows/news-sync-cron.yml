name: Daily News Sync

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated ticker list (optional override)'
        required: false
        type: string

jobs:
  sync-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      CLOUDEVENT_DB_USERNAME: ${{ secrets.CLOUDEVENT_DB_USERNAME }}
      CLOUDEVENT_DB_PASSWORD: ${{ secrets.CLOUDEVENT_DB_PASSWORD }}
      AZURE_SQL_SERVER: quantbot.database.windows.net
      AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
      NEWS_SYNC_TICKERS: ${{ github.event.inputs.tickers || secrets.NEWS_SYNC_TICKERS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run standalone news sync
        run: npm run sync-news
